<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="front/style.css">
    <title>Todo List</title>
</head>
<body>
    <main>
        <header class="encabezado">
            <div class="logo">
                <img src="recursos/todo.svg" alt="">
            </div>
            <nav class="navegacion">
                <img class="github-icon" alt="github">
                <div class="info"><p>About</p></div>
                <div class="English"><a href="#">En</a></div>
                <div class="Chino"><a href="#">Ch</a></div>
            </nav>
        </header>
        <section>
            <div class="imput">
                <input id="taskInput" type="text" placeholder="Add a to-do  item..." />
                <button id="addBtn" class="add-btn">Add</button>
            </div>
        </section>
        <section class="list-section">
            <header class="list-encabezado">
                <button id="markAllBtn" class="mark-all">Mark All Done</button>
                <p class="slogan">Act Now, Simplify Life. ☕</p>
            </header>
            <ul id="taskList" class="list">
                <div id="emptyState" class="empty">
                <p><strong>Add Your First To-Do Item!</strong> 📝</p>
                </div>
            </ul>
        </section>
    </main>
    <script src="front/app.js"></script>
</body>
</html>
